name: Update TCG Prices

on:
  workflow_dispatch:

  schedule:
    - cron: "17 3 * * *"
      timezone: "America/New_York"

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Download repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download current card prices
        run: node scripts/update-prices.mjs

      - name: Save updated prices
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/data/tcg-prices.json

          if git diff --cached --quiet; then
            echo "No price changes were found."
          else
            git commit -m "Update TCG card prices"
            git push
          fi
