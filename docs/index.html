<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PO Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <img src="PO-Tracker-White.png" alt="PO Tracker logo" class="logo">
  </header>

  <main>
    <h1>Track Pokémon Card Prices</h1>
    <p>Search for a Pokémon card to view its information and market price.</p>

    <div class="search-box">
      <input type="text" placeholder="Enter a card name">
      <button type="button">Search</button>
    </div>

    <section class="card-results">
      <h2>Card Results</h2>
      <p>Your search results will appear here.</p>
    </section>
  </main>
</body>
</html>
