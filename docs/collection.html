<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Collection | PO Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <img src="PO-Tracker-White.png" alt="PO Tracker logo" class="logo">

    <nav class="main-nav">
      <a href="index.html">Search</a>
      <a href="collection.html">My Collection</a>
    </nav>
  </header>

  <main>
    <h1>My Collection</h1>
    <p>Your saved Pokémon cards will appear below.</p>
    
    <div class="collection-tools">
      <label for="sortCollection">Sort by:</label>

      <select id="sortCollection">
        <option value="name">Name: A–Z</option>
        <option value="set">Set: A–Z</option>
        <option value="price-high">Price: High to Low</option>
        <option value="price-low">Price: Low to High</option>
      </select>
  </div>
    
    <section class="card-results" id="collectionResults">
      <p>Loading collection...</p>
    </section>
  </main>

  <script src="collection.js?v=4"></script>
</body>
</html>
